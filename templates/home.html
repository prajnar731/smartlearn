<!DOCTYPE html>
<html>
<head>
    <title>SmartLearn</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        .student {
            background: #4facfe;
        }

        .faculty {
            background: #2c3e50;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🎮📚 SmartLearn</h1>
    <p>Choose your role to continue</p>

    <a href="/login/student/" class="btn student">
        🎮 Login as Student
    </a>

    <a href="/login/faculty/" class="btn faculty">
        👩‍🏫 Login as Faculty
    </a>

</div>

</body>
</html>
