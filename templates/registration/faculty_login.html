<!DOCTYPE html>
<html>
<head>
    <title>Faculty Login</title>
    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 320px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Faculty Login</h2>
    <p>Manage courses & students</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button>Login</button>
    </form>
</div>

</body>
</html>
