<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🎮 Student Login</h2>
    <p>Level up your learning 🚀</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button>Start Game</button>
    </form>
</div>

</body>
</html>
